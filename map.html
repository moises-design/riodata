<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RioData — Regional Map</title>
<link rel="icon" href="/favicon.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,700&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://api.mapbox.com/mapbox-gl-js/v3.2.0/mapbox-gl.css" rel="stylesheet">
<script src="https://api.mapbox.com/mapbox-gl-js/v3.2.0/mapbox-gl.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const {createClient}=supabase;
const sb=createClient('https://knbtwcxwdhyjvgncnzjo.supabase.co','sb_publishable_nXdgaJcI0K1zR_u0PvBlAg_SIImbEmw');
</script>
<style>
:root{--ink:#0F0F0E;--ink2:#2A2A27;--ink3:#5C5C54;--border:#E2DDD6;--parch:#F7F3EE;--white:#FDFCFB;--rust:#B8431E;--rustl:#F2E8E3;--teal:#1A6B72;--teall:#E3F0F1;--gold:#B07D1A;--green:#2A6B43;--greenl:#E4F0EA;--r:8px;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;font-family:'Instrument Sans',sans-serif;}
/* NAV */
nav{background:rgba(15,15,14,.97);border-bottom:1px solid rgba(255,255,255,.08);height:52px;display:flex;align-items:center;padding:0 20px;gap:14px;position:relative;z-index:100;}
.brand{font-family:'Fraunces',serif;font-size:18px;font-weight:700;color:white;text-decoration:none;display:flex;align-items:center;gap:6px;}
.brand-dot{width:5px;height:5px;border-radius:50%;background:var(--teal);}
.nav-back{font-size:12px;color:rgba(255,255,255,.4);text-decoration:none;}
.nav-back:hover{color:white;}
.nav-right{margin-left:auto;display:flex;align-items:center;gap:8px;}
.add-btn{padding:6px 14px;border-radius:6px;background:var(--teal);color:white;text-decoration:none;font-size:12.5px;font-weight:600;}
/* FILTER BAR */
.filter-bar{background:rgba(15,15,14,.95);border-bottom:1px solid rgba(255,255,255,.07);padding:8px 16px;display:flex;gap:6px;align-items:center;flex-wrap:wrap;position:relative;z-index:100;}
.filter-label{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:rgba(255,255,255,.25);margin-right:2px;}
.fbtn{padding:5px 12px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid rgba(255,255,255,.14);background:transparent;color:rgba(255,255,255,.5);font-family:inherit;transition:all .12s;}
.fbtn:hover{border-color:rgba(255,255,255,.35);color:rgba(255,255,255,.8);}
.fbtn.on{background:var(--teal);color:white;border-color:var(--teal);}
.map-status{font-size:11.5px;color:rgba(255,255,255,.3);margin-left:auto;}
/* LAYOUT */
.map-wrap{display:flex;height:calc(100vh - 52px - 44px);}
/* MAP */
#map{flex:1;position:relative;}
.mapboxgl-popup-content{border-radius:10px!important;padding:0!important;border:none!important;box-shadow:0 8px 32px rgba(0,0,0,.25)!important;min-width:220px;}
.popup-inner{padding:16px;}
.popup-name{font-family:'Fraunces',serif;font-size:15px;font-weight:700;color:var(--ink);margin-bottom:3px;}
.popup-loc{font-size:11.5px;color:var(--ink3);margin-bottom:10px;display:flex;align-items:center;gap:4px;}
.popup-tags{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:10px;}
.ptag{font-size:9.5px;font-weight:700;padding:2px 8px;border-radius:3px;}
.ptag-ready{background:var(--greenl);color:var(--green);}
.ptag-sector{background:var(--teall);color:var(--teal);}
.ptag-cert{background:#FBF4E3;color:var(--gold);}
.popup-desc{font-size:12px;color:var(--ink3);line-height:1.55;margin-bottom:10px;}
.popup-contact{display:block;padding:8px 12px;background:var(--teal);color:white;border-radius:6px;text-align:center;text-decoration:none;font-size:12.5px;font-weight:600;}
.popup-contact:hover{background:#155960;}
/* SIDEBAR */
.map-sidebar{width:300px;background:var(--white);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.sb-head{padding:14px 16px;border-bottom:1px solid var(--border);}
.sb-title{font-family:'Fraunces',serif;font-size:14px;font-weight:700;margin-bottom:3px;}
.sb-meta{font-size:11.5px;color:var(--ink3);}
.sb-search{padding:10px 12px;border-bottom:1px solid var(--border);}
.sb-inp{width:100%;padding:8px 11px;border:1.5px solid var(--border);border-radius:6px;font-family:inherit;font-size:12.5px;color:var(--ink);}
.sb-inp:focus{outline:none;border-color:var(--teal);}
.co-list{flex:1;overflow-y:auto;}
.co-list::-webkit-scrollbar{width:3px;}
.co-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.co-item{padding:11px 14px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s;display:flex;align-items:center;gap:10px;}
.co-item:hover,.co-item.active{background:var(--parch);}
.co-av{width:32px;height:32px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-family:'Fraunces',serif;font-size:13px;font-weight:700;flex-shrink:0;}
.co-name{font-size:12.5px;font-weight:600;color:var(--ink);line-height:1.3;}
.co-sub{font-size:10.5px;color:var(--ink3);margin-top:2px;}
.co-ready{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-left:auto;}
.co-ready.yes{background:var(--green);}
.co-ready.no{background:var(--border);}
/* STATS OVERLAY */
.map-stats{position:absolute;top:12px;left:12px;z-index:10;background:rgba(255,255,255,.96);backdrop-filter:blur(12px);border:1px solid var(--border);border-radius:10px;padding:12px 16px;display:flex;gap:20px;}
.ms{text-align:center;}
.ms-num{font-family:'Fraunces',serif;font-size:18px;font-weight:700;line-height:1;}
.ms-lbl{font-size:9.5px;text-transform:uppercase;letter-spacing:.08em;color:var(--ink3);margin-top:2px;}
/* LEGEND */
.map-legend{position:absolute;bottom:32px;left:12px;z-index:10;background:rgba(255,255,255,.96);backdrop-filter:blur(12px);border:1px solid var(--border);border-radius:8px;padding:11px 14px;}
.leg-title{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--ink3);margin-bottom:8px;}
.leg-item{display:flex;align-items:center;gap:6px;font-size:11.5px;color:var(--ink3);margin-bottom:5px;}
.leg-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
/* LOADING */
.loading{position:absolute;inset:0;background:rgba(255,255,255,.9);display:flex;align-items:center;justify-content:center;z-index:200;flex-direction:column;gap:12px;}
.spinner{width:32px;height:32px;border:2.5px solid var(--border);border-top-color:var(--teal);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
/* MOBILE */
@media(max-width:768px){.map-sidebar{display:none;}.map-wrap{height:calc(100vh - 52px - 44px);}}
</style>
</head>
<body>

<nav>
  <a class="brand" href="/"><span class="brand-dot"></span>RioData</a>
  <span style="color:rgba(255,255,255,.2)">·</span>
  <a class="nav-back" href="/"><i class="fa-solid fa-arrow-left" style="margin-right:4px"></i>Back</a>
  <span style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:rgba(255,255,255,.25);margin-left:2px;">Regional Map</span>
  <div class="nav-right">
    <span class="map-status" id="map-status"><i class="fa-solid fa-circle-notch fa-spin" style="margin-right:4px"></i>Loading...</span>
    <a href="/onboarding.html" class="add-btn"><i class="fa-solid fa-plus" style="margin-right:4px"></i>Add Business</a>
  </div>
</nav>

<div class="filter-bar">
  <span class="filter-label">Filter</span>
  <button class="fbtn on" onclick="setFilter(this,'')">All</button>
  <button class="fbtn" onclick="setFilter(this,'ready')"><i class="fa-solid fa-check" style="margin-right:3px;font-size:9px"></i>Ready to Work</button>
  <button class="fbtn" onclick="setFilter(this,'US')">🇺🇸 Texas</button>
  <button class="fbtn" onclick="setFilter(this,'MX')">🇲🇽 Mexico</button>
  <button class="fbtn" onclick="setFilter(this,'Construction')"><i class="fa-solid fa-hard-hat" style="margin-right:3px;font-size:10px"></i>Construction</button>
  <button class="fbtn" onclick="setFilter(this,'Energy')"><i class="fa-solid fa-bolt" style="margin-right:3px;font-size:10px"></i>Energy</button>
  <button class="fbtn" onclick="setFilter(this,'Logistics')"><i class="fa-solid fa-truck" style="margin-right:3px;font-size:10px"></i>Logistics</button>
  <button class="fbtn" onclick="setFilter(this,'Manufacturing')"><i class="fa-solid fa-industry" style="margin-right:3px;font-size:10px"></i>Manufacturing</button>
</div>

<div class="map-wrap">
  <div id="map">
    <div class="loading" id="loading">
      <div class="spinner"></div>
      <div style="font-size:13px;color:var(--ink3)">Loading regional map...</div>
    </div>
    <!-- STATS OVERLAY -->
    <div class="map-stats" id="map-stats" style="display:none">
      <div class="ms"><div class="ms-num" id="st-total">0</div><div class="ms-lbl">Companies</div></div>
      <div class="ms"><div class="ms-num" id="st-ready" style="color:var(--green)">0</div><div class="ms-lbl">Ready</div></div>
      <div class="ms"><div class="ms-num" id="st-tx">0</div><div class="ms-lbl">Texas</div></div>
      <div class="ms"><div class="ms-num" id="st-mx">0</div><div class="ms-lbl">Mexico</div></div>
    </div>
    <!-- LEGEND -->
    <div class="map-legend">
      <div class="leg-title">Legend</div>
      <div class="leg-item"><div class="leg-dot" style="background:var(--teal)"></div>Active Company</div>
      <div class="leg-item"><div class="leg-dot" style="background:var(--green);box-shadow:0 0 0 3px rgba(42,107,67,.2)"></div>Ready to Work</div>
      <div class="leg-item"><div class="leg-dot" style="background:var(--rust)"></div>Energy / LNG</div>
      <div class="leg-item"><div class="leg-dot" style="background:var(--gold)"></div>Logistics</div>
      <div class="leg-item"><div class="leg-dot" style="background:#5B3FA6"></div>Manufacturing</div>
    </div>
  </div>

  <!-- SIDEBAR -->
  <div class="map-sidebar">
    <div class="sb-head">
      <div class="sb-title">Company Directory</div>
      <div class="sb-meta" id="sb-meta">Loading...</div>
    </div>
    <div class="sb-search">
      <input class="sb-inp" id="sb-search" placeholder="Search companies..." oninput="filterSidebar()">
    </div>
    <div class="co-list" id="co-list">
      <div style="text-align:center;padding:32px;color:var(--ink3)"><div class="spinner" style="margin:0 auto 10px"></div>Loading...</div>
    </div>
  </div>
</div>

<script>
// ── MAPBOX ───────────────────────────────────────────
mapboxgl.accessToken = 'pk.eyJ1IjoibW9pc2VzdmlzdGF0ZWNoIiwiYSI6ImNtbnhsZ3V1aDAzbTUycnBxamNicWdqNTMifQ.IRiCCZH2dXnwWuhJK-QBnQ';

// Fallback: if Mapbox token fails, use OpenStreetMap tiles via mapbox-gl alternative
let map;
let allCos = [];
let markers = [];
let activeFilter = '';

const SECTOR_COLORS = {
  'Construction': '#1A6B72',
  'Energy': '#B8431E',
  'Manufacturing': '#5B3FA6',
  'Logistics': '#B07D1A',
  'Technology': '#1A5CB8',
  'Healthcare': '#B8431E',
  'default': '#5C5C54'
};

const CITY_COORDS = {
  'Laredo': [-99.5075, 27.5036],
  'McAllen': [-98.2301, 26.2034],
  'Brownsville': [-97.4975, 25.9017],
  'Edinburg': [-98.1633, 26.3017],
  'Mission': [-98.3251, 26.2159],
  'Harlingen': [-97.6961, 26.1906],
  'Nuevo Laredo': [-99.5161, 27.4763],
  'Matamoros': [-97.5032, 25.8692],
  'Monterrey': [-100.3161, 25.6866],
  'Reynosa': [-98.2977, 26.0852],
  'Rio Grande City': [-98.8202, 26.3793],
  'Eagle Pass': [-100.4996, 28.7091],
};

function getCoords(city, country) {
  if (CITY_COORDS[city]) return CITY_COORDS[city];
  // Scatter around region if unknown
  if (country === 'MX') return [-99.0 + (Math.random() - 0.5) * 3, 26.5 + (Math.random() - 0.5) * 2];
  return [-98.5 + (Math.random() - 0.5) * 3, 26.8 + (Math.random() - 0.5) * 2];
}

function getColor(c) {
  if (c.ready_to_work) return '#2A6B43';
  return SECTOR_COLORS[c.sector] || SECTOR_COLORS.default;
}

// Init map
try {
  map = new mapboxgl.Map({
    container: 'map',
    style: 'mapbox://styles/mapbox/light-v11',
    center: [-98.8, 26.8],
    zoom: 7.5,
    minZoom: 5,
    maxZoom: 16
  });

  map.addControl(new mapboxgl.NavigationControl(), 'bottom-right');
  map.addControl(new mapboxgl.ScaleControl(), 'bottom-left');

  map.on('load', () => {
    loadCompanies();
  });
} catch(e) {
  // Fallback if token invalid
  loadCompanies();
}

async function loadCompanies() {
  const { data } = await sb.from('companies').select('*').eq('status', 'active').order('ready_to_work', { ascending: false });
  allCos = data?.length ? data : getDemoCompanies();
  document.getElementById('loading').style.display = 'none';
  document.getElementById('map-stats').style.display = 'flex';
  updateStats(allCos);
  addMarkers(allCos);
  renderSidebar(allCos);
  document.getElementById('map-status').innerHTML = '<i class="fa-solid fa-circle" style="color:#4CAF78;margin-right:4px;font-size:8px"></i>' + allCos.length + ' companies mapped';
}

function addMarkers(cos) {
  // Remove existing
  markers.forEach(m => m.remove());
  markers = [];

  cos.forEach(c => {
    const coords = getCoords(c.city, c.country);
    const color = getColor(c);

    // Custom marker element
    const el = document.createElement('div');
    el.style.cssText = `width:32px;height:32px;border-radius:50%;background:${color};border:2.5px solid white;display:flex;align-items:center;justify-content:center;font-family:'Fraunces',serif;font-size:12px;font-weight:700;color:white;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.3);transition:transform .15s;`;
    el.textContent = (c.legal_name || 'C')[0].toUpperCase();
    el.title = c.legal_name;
    if (c.ready_to_work) {
      el.style.boxShadow = `0 0 0 3px rgba(42,107,67,.25), 0 2px 8px rgba(0,0,0,.3)`;
    }
    el.addEventListener('mouseenter', () => el.style.transform = 'scale(1.2)');
    el.addEventListener('mouseleave', () => el.style.transform = 'scale(1)');

    // Popup
    const certs = [c.cert_hubzone && 'HUBZone', c.cert_sam && 'SAM', c.cert_ctpat && 'C-TPAT', c.cert_immex && 'IMMEX'].filter(Boolean);
    const popup = new mapboxgl.Popup({ offset: 18, closeButton: true, maxWidth: '260px' })
      .setHTML(`<div class="popup-inner">
        <div class="popup-name">${c.legal_name}</div>
        <div class="popup-loc"><i class="fa-solid fa-location-dot" style="font-size:10px;color:var(--teal)"></i>${c.city || ''}${c.state_province ? ', ' + c.state_province : ''} ${c.country === 'MX' ? '🇲🇽' : '🇺🇸'}</div>
        <div class="popup-tags">
          ${c.ready_to_work ? '<span class="ptag ptag-ready">✅ Ready</span>' : ''}
          <span class="ptag ptag-sector">${c.sector || 'General'}</span>
          ${certs.map(t => `<span class="ptag ptag-cert">${t}</span>`).join('')}
        </div>
        ${c.description ? `<div class="popup-desc">${c.description.substring(0, 100)}...</div>` : ''}
        ${c.contact_email ? `<a class="popup-contact" href="mailto:${c.contact_email}"><i class="fa-solid fa-envelope" style="margin-right:5px"></i>Contact ${c.contact_name || 'Company'}</a>` : ''}
      </div>`);

    const marker = new mapboxgl.Marker({ element: el, anchor: 'center' })
      .setLngLat(coords)
      .setPopup(popup);

    if (map) marker.addTo(map);
    markers.push(marker);
  });
}

function updateStats(cos) {
  document.getElementById('st-total').textContent = cos.length;
  document.getElementById('st-ready').textContent = cos.filter(c => c.ready_to_work).length;
  document.getElementById('st-tx').textContent = cos.filter(c => c.country === 'US').length;
  document.getElementById('st-mx').textContent = cos.filter(c => c.country === 'MX').length;
}

function setFilter(el, type) {
  document.querySelectorAll('.fbtn').forEach(b => b.classList.remove('on'));
  el.classList.add('on');
  activeFilter = type;
  let filtered = allCos;
  if (type === 'ready') filtered = allCos.filter(c => c.ready_to_work);
  else if (type === 'US') filtered = allCos.filter(c => c.country === 'US');
  else if (type === 'MX') filtered = allCos.filter(c => c.country === 'MX');
  else if (type) filtered = allCos.filter(c => c.sector === type);
  updateStats(filtered);
  addMarkers(filtered);
  renderSidebar(filtered);
}

function renderSidebar(cos) {
  const q = (document.getElementById('sb-search')?.value || '').toLowerCase();
  const filtered = q ? cos.filter(c => (c.legal_name || '').toLowerCase().includes(q) || (c.city || '').toLowerCase().includes(q)) : cos;
  document.getElementById('sb-meta').textContent = filtered.length + ' companies';
  const pal = ['#E3F0F1,#1A6B72', '#F2E8E3,#B8431E', '#FBF4E3,#B07D1A', '#E4F0EA,#2A6B43'];
  document.getElementById('co-list').innerHTML = filtered.length ? filtered.map(c => {
    const [bg, fg] = pal[(c.legal_name || '').charCodeAt(0) % pal.length].split(',');
    return `<div class="co-item" onclick="flyTo('${c.id || c.legal_name}')">
      <div class="co-av" style="background:${bg};color:${fg}">${(c.legal_name || 'C')[0]}</div>
      <div style="min-width:0;flex:1">
        <div class="co-name" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${c.legal_name}</div>
        <div class="co-sub">📍 ${c.city || ''}${c.state_province ? ', ' + c.state_province : ''} · ${c.sector || 'General'}</div>
      </div>
      <div class="co-ready ${c.ready_to_work ? 'yes' : 'no'}"></div>
    </div>`;
  }).join('') : '<div style="text-align:center;padding:32px;color:var(--ink3)">No companies found</div>';
}

function flyTo(id) {
  const c = allCos.find(c => (c.id || c.legal_name) === id);
  if (!c || !map) return;
  const coords = getCoords(c.city, c.country);
  map.flyTo({ center: coords, zoom: 12, duration: 1000 });
  // Open popup for this marker
  const idx = allCos.indexOf(c);
  if (markers[idx]) markers[idx].togglePopup();
}

function filterSidebar() { renderSidebar(activeFilter ? allCos.filter(c => {
  if (activeFilter === 'ready') return c.ready_to_work;
  if (activeFilter === 'US') return c.country === 'US';
  if (activeFilter === 'MX') return c.country === 'MX';
  return c.sector === activeFilter;
}) : allCos); }

function getDemoCompanies() {
  return [
    { id: 'd1', legal_name: 'Dominion Construction', city: 'Laredo', state_province: 'TX', country: 'US', sector: 'Construction', ready_to_work: true, cert_sam: false, description: 'Commercial and industrial general contractor in Laredo.', contact_email: 'info@dominionconstruction.com' },
    { id: 'd2', legal_name: 'CBI Group Customs Logistics', city: 'Laredo', state_province: 'TX', country: 'US', sector: 'Logistics', ready_to_work: true, cert_sam: true, description: 'Cross-border customs brokerage and logistics.', contact_email: 'info@cbigroup.com' },
    { id: 'd3', legal_name: 'CRV Construction', city: 'McAllen', state_province: 'TX', country: 'US', sector: 'Construction', ready_to_work: true, description: 'Commercial roofing and renovation contractor.', contact_email: 'info@crvconstruction.com' },
    { id: 'd4', legal_name: 'CLV Construction LLC', city: 'Brownsville', state_province: 'TX', country: 'US', sector: 'Construction', ready_to_work: true, description: 'Custom homes and commercial build-outs.', contact_email: 'info@clvconstruction.com' },
    { id: 'd5', legal_name: 'NovaLink', city: 'Brownsville', state_province: 'TX', country: 'US', sector: 'Manufacturing', ready_to_work: true, cert_immex: true, description: 'Maquiladora and cross-border manufacturing.', contact_email: 'info@novalink.mx' },
    { id: 'd6', legal_name: 'RLS International Transport', city: 'Laredo', state_province: 'TX', country: 'US', sector: 'Logistics', ready_to_work: true, description: 'Mexico-to-US freight and logistics.', contact_email: 'info@rlstransport.com' },
  ];
}
</script>
</body>
</html>
