<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png">
  <link rel="apple-touch-icon" href="/icon-192.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RioData — Regional Map</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,700;9..144,800&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #0F0F0E; --ink-2: #2A2A27; --ink-3: #5C5C54;
  --border: #E2DDD6; --parchment: #F7F3EE; --white: #FDFCFB;
  --rust: #B8431E; --rust-light: #F2E8E3;
  --teal: #1A6B72; --teal-light: #E3F0F1;
  --gold: #B07D1A; --gold-light: #FBF4E3;
  --green: #2A6B43; --green-light: #E4F0EA;
  --r: 8px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Instrument Sans',sans-serif;background:var(--parchment);color:var(--ink);height:100vh;overflow:hidden;display:flex;flex-direction:column;}

/* TOP NAV */
.topnav{
  background:var(--white);border-bottom:1px solid var(--border);
  padding:0 24px;height:56px;display:flex;align-items:center;
  justify-content:space-between;flex-shrink:0;z-index:100;
}
.brand{font-family:'Fraunces',serif;font-size:20px;font-weight:700;color:var(--ink);text-decoration:none;}
.brand span{color:var(--rust);}
.nav-right{display:flex;align-items:center;gap:10px;}
.btn-sm{padding:7px 14px;border-radius:var(--r);font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;transition:all 0.15s;border:1.5px solid var(--border);background:transparent;color:var(--ink-3);}
.btn-sm:hover{border-color:var(--ink);color:var(--ink);}
.btn-sm-fill{background:var(--rust);color:white;border-color:var(--rust);}
.btn-sm-fill:hover{background:#D4582E;}

/* LAYOUT */
.map-layout{display:flex;flex:1;overflow:hidden;}

/* SIDEBAR */
.map-sidebar{
  width:360px;flex-shrink:0;
  background:var(--white);border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  overflow:hidden;
}
.sidebar-search{padding:16px;border-bottom:1px solid var(--border);}
.search-input{
  width:100%;padding:10px 14px;
  border:1.5px solid var(--border);border-radius:var(--r);
  font-family:inherit;font-size:13.5px;color:var(--ink);
  background:var(--parchment);transition:all 0.2s;
}
.search-input:focus{outline:none;border-color:var(--rust);background:var(--white);}

.filter-chips{display:flex;gap:6px;flex-wrap:wrap;padding:10px 16px;border-bottom:1px solid var(--border);}
.chip{
  padding:5px 11px;border-radius:20px;
  font-size:12px;font-weight:500;cursor:pointer;
  border:1.5px solid var(--border);background:var(--white);color:var(--ink-3);
  transition:all 0.15s;white-space:nowrap;
}
.chip:hover{border-color:var(--rust);color:var(--rust);}
.chip.active{background:var(--rust);color:white;border-color:var(--rust);}

.sidebar-header{
  padding:10px 16px;display:flex;justify-content:space-between;align-items:center;
  font-size:12px;color:var(--ink-3);border-bottom:1px solid var(--border);
  background:var(--parchment);
}
.sidebar-count strong{color:var(--ink);}
.sidebar-sort select{border:none;background:transparent;font-family:inherit;font-size:12px;color:var(--ink-3);cursor:pointer;}
.sidebar-sort select:focus{outline:none;}

.company-list{overflow-y:auto;flex:1;}
.company-item{
  padding:14px 16px;border-bottom:1px solid var(--border);
  cursor:pointer;transition:background 0.15s;
  display:flex;gap:12px;align-items:flex-start;
}
.company-item:hover{background:var(--parchment);}
.company-item.selected{background:var(--rust-light);border-left:3px solid var(--rust);}
.company-item.selected .ci-name{color:var(--rust);}

.ci-avatar{
  width:38px;height:38px;border-radius:8px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-family:'Fraunces',serif;font-size:16px;font-weight:700;
}
.ci-body{flex:1;min-width:0;}
.ci-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
.ci-name{font-size:13.5px;font-weight:700;color:var(--ink);line-height:1.3;}
.ci-ready{
  width:9px;height:9px;border-radius:50%;flex-shrink:0;margin-top:4px;
}
.ready-y{background:var(--green);box-shadow:0 0 0 2px rgba(42,107,67,0.2);}
.ready-n{background:var(--border);}
.ci-loc{font-size:11.5px;color:var(--ink-3);margin-top:2px;}
.ci-tags{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px;}
.ci-tag{
  font-size:10.5px;padding:2px 7px;border-radius:3px;
  background:var(--parchment);border:1px solid var(--border);
  color:var(--ink-3);font-weight:500;
}

/* MAP AREA */
.map-area{flex:1;position:relative;overflow:hidden;}

/* SVG MAP */
.map-svg-container{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:linear-gradient(180deg,#E8F4F4 0%,#D4EAE8 40%,#C8E0D8 100%);}
.map-svg{width:100%;height:100%;max-width:none;}

/* MAP CONTROLS */
.map-controls{
  position:absolute;right:20px;top:20px;
  display:flex;flex-direction:column;gap:6px;
  z-index:20;
}
.map-ctrl-btn{
  width:36px;height:36px;background:var(--white);
  border:1px solid var(--border);border-radius:var(--r);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:16px;transition:all 0.15s;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
}
.map-ctrl-btn:hover{background:var(--parchment);border-color:var(--rust);}

/* LEGEND */
.map-legend{
  position:absolute;left:16px;bottom:20px;
  background:var(--white);border:1px solid var(--border);
  border-radius:var(--r);padding:14px 16px;
  z-index:20;box-shadow:0 4px 16px rgba(0,0,0,0.1);
  min-width:180px;
}
.legend-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--ink-3);margin-bottom:10px;}
.legend-item{display:flex;align-items:center;gap:8px;font-size:12.5px;margin-bottom:6px;}
.legend-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0;}

/* STATS OVERLAY */
.map-stats{
  position:absolute;right:68px;top:20px;
  display:flex;gap:10px;z-index:20;
}
.map-stat-pill{
  background:var(--white);border:1px solid var(--border);
  border-radius:20px;padding:7px 14px;
  font-size:12px;font-weight:600;
  box-shadow:0 2px 8px rgba(0,0,0,0.08);
  display:flex;align-items:center;gap:6px;
}
.pill-dot{width:8px;height:8px;border-radius:50%;}

/* DETAIL PANEL */
.detail-panel{
  position:absolute;right:0;top:0;bottom:0;
  width:340px;background:var(--white);
  border-left:1px solid var(--border);
  transform:translateX(100%);
  transition:transform 0.3s ease;
  z-index:30;overflow-y:auto;
  box-shadow:-8px 0 24px rgba(0,0,0,0.1);
}
.detail-panel.open{transform:translateX(0);}
.dp-header{padding:20px 20px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:flex-start;}
.dp-close{cursor:pointer;font-size:18px;color:var(--ink-3);line-height:1;}
.dp-name{font-family:'Fraunces',serif;font-size:20px;font-weight:700;margin-bottom:4px;line-height:1.2;}
.dp-loc{font-size:13px;color:var(--ink-3);}
.dp-body{padding:20px;}
.dp-section{margin-bottom:20px;}
.dp-section-title{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--ink-3);margin-bottom:10px;}
.dp-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border);font-size:13px;}
.dp-row:last-child{border-bottom:none;}
.dp-key{color:var(--ink-3);}
.dp-val{font-weight:600;color:var(--ink);text-align:right;max-width:180px;}
.dp-tags{display:flex;flex-wrap:wrap;gap:6px;}
.dp-tag{font-size:11.5px;padding:3px 10px;border-radius:3px;background:var(--parchment);border:1px solid var(--border);color:var(--ink-3);font-weight:500;}
.dp-btns{display:flex;flex-direction:column;gap:8px;margin-top:20px;}
.dp-btn{padding:11px;border-radius:var(--r);font-family:inherit;font-size:13.5px;font-weight:600;cursor:pointer;border:none;transition:all 0.15s;}
.dp-btn-primary{background:var(--rust);color:white;}
.dp-btn-primary:hover{background:#D4582E;}
.dp-btn-ghost{background:transparent;color:var(--ink);border:1.5px solid var(--border);}
.dp-btn-ghost:hover{border-color:var(--ink);background:var(--parchment);}

/* SVG pins */
.pin{cursor:pointer;transition:transform 0.2s;}
.pin:hover{transform:scale(1.2);}
.pin.selected{transform:scale(1.3);}
.pin-circle{transition:all 0.2s;}
.pin:hover .pin-circle,.pin.selected .pin-circle{stroke-width:2.5;}

/* Map tooltip */
.map-tooltip{
  position:absolute;background:var(--ink);color:white;
  padding:6px 11px;border-radius:6px;font-size:12px;font-weight:500;
  pointer-events:none;white-space:nowrap;z-index:50;
  transform:translate(-50%,-100%) translateY(-10px);
  opacity:0;transition:opacity 0.15s;
}
.map-tooltip.show{opacity:1;}

/* LAYER TOGGLE */
.layer-toggle{
  position:absolute;left:16px;top:20px;
  background:var(--white);border:1px solid var(--border);
  border-radius:var(--r);padding:14px 16px;z-index:20;
  box-shadow:0 4px 16px rgba(0,0,0,0.1);
  min-width:160px;
}
.lt-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--ink-3);margin-bottom:10px;}
.lt-item{display:flex;align-items:center;gap:8px;font-size:13px;margin-bottom:8px;cursor:pointer;}
.lt-item input{accent-color:var(--rust);width:14px;height:14px;}
.lt-label{font-size:12.5px;font-weight:500;}

@media(max-width:768px){
  .map-sidebar{width:100%;position:absolute;bottom:0;left:0;right:0;height:50%;z-index:40;}
  .map-stats{display:none;}
  .layer-toggle{display:none;}
}
</style>

<!-- ═══ RIODATA SUPABASE CONNECTION ═══ -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPA_URL = 'https://knbtwcxwdhyjvgncnzjo.supabase.co';
const SUPA_KEY = 'sb_publishable_nXdgaJcI0K1zR_u0PvBlAg_SIImbEmw';
const { createClient } = supabase;
const sb = createClient(SUPA_URL, SUPA_KEY);

let currentUser = null;

sb.auth.onAuthStateChange((event, session) => {
  currentUser = session?.user || null;
});

async function rdSignUp(email, password, fullName, userType, org) {
  const { data, error } = await sb.auth.signUp({
    email, password,
    options: { data: { full_name: fullName, user_type: userType, organization: org } }
  });
  if (error) return { error: error.message };
  return { success: true, user: data.user };
}

async function rdSignIn(email, password) {
  const { data, error } = await sb.auth.signInWithPassword({ email, password });
  if (error) return { error: error.message };
  return { success: true, user: data.user };
}

async function rdSignOut() {
  await sb.auth.signOut();
  window.location.reload();
}

async function rdSubmitCompany(formData) {
  const { data, error } = await sb.from('companies').insert([formData]);
  if (error) return { error: error.message };
  return { success: true };
}

async function rdLoadCompanies(filters) {
  filters = filters || {};
  let query = sb.from('companies').select('*').eq('status', 'active');
  if (filters.sector) query = query.eq('sector', filters.sector);
  if (filters.city) query = query.ilike('city', '%' + filters.city + '%');
  if (filters.ready) query = query.eq('ready_to_work', true);
  if (filters.search) query = query.or('legal_name.ilike.%' + filters.search + '%,description.ilike.%' + filters.search + '%');
  const { data, error } = await query.order('created_at', { ascending: false });
  return error ? [] : data;
}

async function rdLoadProjects() {
  const { data, error } = await sb.from('projects').select('*').eq('status', 'active').order('created_at', { ascending: false });
  return error ? [] : data;
}

async function rdSubmitProject(formData) {
  const { data, error } = await sb.from('projects').insert([formData]);
  if (error) return { error: error.message };
  return { success: true };
}

async function rdTrack(page) {
  await sb.from('analytics_events').insert([{ event_type: 'page_view', page: page, user_id: currentUser?.id || null }]);
}

window.addEventListener('load', () => rdTrack(window.location.pathname || '/'));
</script>

  <a href="index.html" class="brand">Rio<span style='color:var(--teal)'>Data</span> <span style="font-family:'Instrument Sans',sans-serif;font-size:13px;font-weight:400;color:var(--ink-3);margin-left:8px;">Map View</span></a>

<div class="map-layout">

  <!-- SIDEBAR -->
  <div class="map-sidebar">

      <input class="search-input" placeholder="🔍  Search companies, cities, services..." oninput="filterList(this.value)">

<script>
// COMPANY DATA
const companies = [
  { id:1, name:"Falcon Industrial Services", loc:"Laredo, TX", sector:"Construction", ready:true, services:["Structural Welding","Pipeline Support","Steel Fab"], certs:["HUBZone","SAM"], employees:"21–75", capacity:"$100K–$5M", pin:"F" },
  { id:2, name:"Rio Pipe & Steel", loc:"Laredo, TX", sector:"Construction", ready:true, services:["Pipefitting","Ironwork","Fabrication"], certs:["SAM"], employees:"6–20", capacity:"Up to $1M", pin:"R" },
  { id:3, name:"Laredo Electrical LLC", loc:"Laredo, TX", sector:"Energy", ready:true, services:["Commercial Electrical","Substation","High-Voltage"], certs:["SAM","OSHA 30"], employees:"16–50", capacity:"$100K–$5M", pin:"L" },
  { id:4, name:"Border City Logistics", loc:"Laredo, TX", sector:"Logistics", ready:false, services:["Cross-Border Freight","Customs Brokerage"], certs:["C-TPAT"], employees:"16–50", capacity:"Up to $5M", pin:"B" },
  { id:5, name:"NorMex Industrial SA", loc:"Nuevo Laredo, Tamps", sector:"Construction", ready:true, services:["Concrete","Civil Works","Site Prep"], certs:["IMSS Compliant"], employees:"51–200", capacity:"$500K–$10M", pin:"N" },
  { id:6, name:"Valley Civil Contractors", loc:"McAllen, TX", sector:"Construction", ready:true, services:["Site Prep","Grading","Underground Utilities"], certs:["HUBZone","SAM"], employees:"21–75", capacity:"$50K–$2M", pin:"V" },
  { id:7, name:"RGV Mechanical LLC", loc:"McAllen, TX", sector:"Energy", ready:true, services:["Mechanical Contracting","HVAC","Piping"], certs:["SAM"], employees:"16–50", capacity:"Up to $3M", pin:"R" },
  { id:8, name:"South Texas Crane & Rigging", loc:"Mission, TX", sector:"Construction", ready:false, services:["Crane Services","Rigging","Heavy Lift"], certs:[], employees:"6–20", capacity:"Up to $500K", pin:"S" },
  { id:9, name:"Gulf Coast Marine Const.", loc:"Brownsville, TX", sector:"Energy", ready:true, services:["Marine Construction","Offshore Support","LNG"], certs:["SAM","HUBZone"], employees:"51–200", capacity:"$1M–$20M", pin:"G" },
  { id:10, name:"Sendero Electric", loc:"Brownsville, TX", sector:"Energy", ready:true, services:["Commercial Electrical","Industrial Wiring"], certs:["SAM"], employees:"16–50", capacity:"Up to $5M", pin:"S" },
  { id:11, name:"Border Energy Solutions", loc:"Matamoros, Tamps", sector:"Energy", ready:true, services:["LNG Support","Mechanical","Inspection"], certs:["ISO 9001"], employees:"21–75", capacity:"$500K–$5M", pin:"B" },
  { id:12, name:"Coastal Fabricators Inc.", loc:"Corpus Christi, TX", sector:"Construction", ready:true, services:["Steel Fabrication","Industrial","Offshore"], certs:["SAM","NCCER"], employees:"51–200", capacity:"$500K–$20M", pin:"C" },
  { id:13, name:"NorMex Manufacturing Co.", loc:"Monterrey, NL", sector:"Manufacturing", ready:true, services:["CNC Machining","Metal Fab","OEM Parts"], certs:["IMMEX","ISO 9001"], employees:"201–500", capacity:"$1M–$50M", pin:"M" },
  { id:14, name:"Monterrey Logistics Group", loc:"Monterrey, NL", sector:"Logistics", ready:false, services:["Rail Freight","Cross-Border","Distribution"], certs:["C-TPAT"], employees:"51–200", capacity:"Up to $10M", pin:"M" },
];

let currentFilter = 'all';
let selectedId = null;

function renderList(list) {
  const el = document.getElementById('company-list');
  el.innerHTML = list.map(c => `
    <div class="company-item ${c.id === selectedId ? 'selected':''}" data-id="${c.id}" onclick="selectCompany(${c.id})">
      <div class="ci-avatar" style="background:${sectorColor(c.sector,true)};color:${sectorColor(c.sector,false)}">${c.pin}</div>
      <div class="ci-body">
        <div class="ci-top">
          <div class="ci-name">${c.name}</div>
          <div class="ci-ready ${c.ready?'ready-y':'ready-n'}"></div>
        </div>
        <div class="ci-loc">📍 ${c.loc}</div>
        <div class="ci-tags">
          <span class="ci-tag">${c.sector}</span>
          ${c.certs.slice(0,2).map(cert=>`<span class="ci-tag">${cert}</span>`).join('')}
        </div>
      </div>
    </div>`).join('');
  document.getElementById('list-count').innerHTML = `<strong>${list.length}</strong> companies`;
}

function sectorColor(sector, bg) {
  const map = {
    Construction: ['#F2E8E3','#B8431E'],
    Energy: ['#E3F0F1','#1A6B72'],
    Logistics: ['#FBF4E3','#B07D1A'],
    Manufacturing: ['#E4F0EA','#2A6B43'],
    Technology: ['#E8E8F4','#4A4A8A'],
  };
  const pair = map[sector] || ['#F4F4F4','#666'];
  return bg ? pair[0] : pair[1];
}

function filterChip(el, key) {
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  currentFilter = key;
  applyFilter();
}

function applyFilter() {
  let list = companies;
  if (currentFilter === 'ready') list = list.filter(c => c.ready);
  else if (currentFilter !== 'all') list = list.filter(c => c.sector.toLowerCase().includes(currentFilter));
  renderList(list);
}

function filterList(q) {
  q = q.toLowerCase();
  const list = companies.filter(c =>
    c.name.toLowerCase().includes(q) ||
    c.loc.toLowerCase().includes(q) ||
    c.sector.toLowerCase().includes(q) ||
    c.services.some(s => s.toLowerCase().includes(q))
  );
  renderList(list);
}

function selectCompany(id) {
  selectedId = id;
  const c = companies.find(x => x.id === id);
  if (!c) return;

  // highlight pin
  document.querySelectorAll('.pin').forEach(p => p.classList.remove('selected'));
  const pin = document.querySelector(`.pin[data-id="${id}"]`);
  if (pin) pin.classList.add('selected');

  // highlight list item
  document.querySelectorAll('.company-item').forEach(i => i.classList.remove('selected'));
  const item = document.querySelector(`.company-item[data-id="${id}"]`);
  if (item) { item.classList.add('selected'); item.scrollIntoView({ behavior:'smooth', block:'nearest' }); }

  // detail panel
  document.getElementById('dp-name').textContent = c.name;
  document.getElementById('dp-loc').textContent = '📍 ' + c.loc;
  document.getElementById('dp-body').innerHTML = `
    <div class="dp-section">
      <div class="dp-section-title">Status</div>
      <div class="dp-row"><span class="dp-key">Ready to Work</span><span class="dp-val" style="color:${c.ready?'var(--green)':'var(--ink-3)'}">${c.ready ? '✅ Yes — Active' : '⬜ Not flagged'}</span></div>
      <div class="dp-row"><span class="dp-key">Sector</span><span class="dp-val">${c.sector}</span></div>
      <div class="dp-row"><span class="dp-key">Employees</span><span class="dp-val">${c.employees}</span></div>
      <div class="dp-row"><span class="dp-key">Project Capacity</span><span class="dp-val">${c.capacity}</span></div>
    </div>
    <div class="dp-section">
      <div class="dp-section-title">Services</div>
      <div class="dp-tags">${c.services.map(s=>`<span class="dp-tag">${s}</span>`).join('')}</div>
    </div>
    ${c.certs.length ? `<div class="dp-section">
      <div class="dp-section-title">Certifications</div>
      <div class="dp-tags">${c.certs.map(s=>`<span class="dp-tag" style="background:var(--green-light);color:var(--green);border-color:rgba(42,107,67,0.2)">✓ ${s}</span>`).join('')}</div>
    </div>` : ''}
    <div class="dp-btns">
      <button class="dp-btn dp-btn-primary">📧 Contact This Company</button>
      <button class="dp-btn dp-btn-ghost">View Full Profile →</button>
    </div>
  `;
  document.getElementById('detail-panel').classList.add('open');
}

function selectProject(id) {
  const projects = {
    lng: { name:'Port of Brownsville LNG Terminal', loc:'Brownsville, TX', value:'$420M', deadline:'May 15, 2025', matches: 22 },
    dc: { name:'Starr County Data Campus', loc:'Rio Grande City, TX', value:'$280M', deadline:'Apr 28, 2025', matches: 14 },
    gov: { name:'Webb County Road Maintenance', loc:'Laredo, TX', value:'$18M/yr', deadline:'Jun 1, 2025', matches: 31 },
  };
  const p = projects[id];
  if (!p) return;
  document.getElementById('dp-name').textContent = p.name;
  document.getElementById('dp-loc').textContent = '📍 ' + p.loc;
  document.getElementById('dp-body').innerHTML = `
    <div class="dp-section">
      <div class="dp-section-title">Project Details</div>
      <div class="dp-row"><span class="dp-key">Total Value</span><span class="dp-val" style="color:var(--green)">${p.value}</span></div>
      <div class="dp-row"><span class="dp-key">Application Deadline</span><span class="dp-val">${p.deadline}</span></div>
      <div class="dp-row"><span class="dp-key">Matched Companies</span><span class="dp-val" style="color:var(--teal)">${p.matches} local matches</span></div>
    </div>
    <div class="dp-btns">
      <button class="dp-btn dp-btn-primary">View Full Opportunity →</button>
      <button class="dp-btn dp-btn-ghost" onclick="closeDetail()">Close</button>
    </div>`;
  document.getElementById('detail-panel').classList.add('open');
}

function closeDetail() {
  document.getElementById('detail-panel').classList.remove('open');
  document.querySelectorAll('.pin').forEach(p => p.classList.remove('selected'));
  document.querySelectorAll('.company-item').forEach(i => i.classList.remove('selected'));
  selectedId = null;
}

// TOOLTIP
function showTooltip(e, text) {
  const tt = document.getElementById('map-tooltip');
  tt.textContent = text;
  tt.classList.add('show');
  const rect = document.getElementById('svg-container').getBoundingClientRect();
  tt.style.left = (e.clientX - rect.left) + 'px';
  tt.style.top = (e.clientY - rect.top) + 'px';
}
function hideTooltip() {
  document.getElementById('map-tooltip').classList.remove('show');
}

// LAYER TOGGLE
function toggleLayer(id) {
  const el = document.getElementById('layer-' + id);
  if (el) el.style.display = el.style.display === 'none' ? '' : 'none';
}

// ZOOM
let zoomLevel = 1;
let panX = 0, panY = 0;
function zoomMap(factor) {
  zoomLevel = Math.min(Math.max(zoomLevel * factor, 0.6), 3);
  applyTransform();
}
function resetZoom() { zoomLevel=1; panX=0; panY=0; applyTransform(); }
function applyTransform() {
  document.getElementById('main-map').style.transform = `scale(${zoomLevel}) translate(${panX}px,${panY}px)`;
  document.getElementById('main-map').style.transformOrigin = 'center center';
}

// INIT
renderList(companies);
</script>
