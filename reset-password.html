<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RioData — Reset Password</title>
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,700&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const { createClient } = supabase;
const sb = createClient(
  'https://knbtwcxwdhyjvgncnzjo.supabase.co',
  'sb_publishable_nXdgaJcI0K1zR_u0PvBlAg_SIImbEmw'
);
</script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Instrument Sans',sans-serif;background:#F7F3EE;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;}
.card{background:#FDFCFB;border:1px solid #E2DDD6;border-radius:16px;padding:48px 40px;width:100%;max-width:420px;box-shadow:0 4px 24px rgba(0,0,0,0.06);}
.brand{font-family:'Fraunces',serif;font-size:22px;font-weight:700;color:#0F0F0E;margin-bottom:28px;text-align:center;}
.brand span{color:#1A6B72;}
h1{font-family:'Fraunces',serif;font-size:26px;font-weight:700;letter-spacing:-0.5px;color:#0F0F0E;margin-bottom:8px;}
.sub{font-size:14px;color:#5C5C54;margin-bottom:28px;line-height:1.6;}
.form-group{margin-bottom:16px;}
label{display:block;font-size:13px;font-weight:600;color:#2A2A27;margin-bottom:6px;}
input{width:100%;padding:11px 14px;border:1.5px solid #E2DDD6;border-radius:8px;font-family:inherit;font-size:14px;color:#0F0F0E;background:#FDFCFB;transition:border-color 0.2s;}
input:focus{outline:none;border-color:#1A6B72;}
.btn{width:100%;padding:13px;border-radius:8px;font-family:inherit;font-size:15px;font-weight:600;cursor:pointer;border:none;transition:all 0.2s;margin-top:8px;}
.btn-primary{background:#1A6B72;color:white;}
.btn-primary:hover{background:#155960;}
.btn-primary:disabled{background:#ccc;cursor:not-allowed;}
.msg{padding:12px 16px;border-radius:8px;font-size:13.5px;margin-top:16px;display:none;line-height:1.5;}
.msg-success{background:#E4F0EA;color:#2A6B43;border:1px solid rgba(42,107,67,0.2);}
.msg-error{background:#F2E8E3;color:#B8431E;border:1px solid rgba(184,67,30,0.2);}
.back{text-align:center;margin-top:20px;font-size:13px;color:#5C5C54;}
.back a{color:#1A6B72;text-decoration:none;font-weight:600;}
.strength{height:4px;border-radius:2px;background:#E2DDD6;margin-top:6px;overflow:hidden;}
.strength-fill{height:100%;border-radius:2px;transition:all 0.3s;width:0%;}
.strength-text{font-size:11px;margin-top:4px;}
</style>
</head>
<body>
<div class="card">
  <div class="brand">Rio<span>Data</span></div>

  <div id="reset-form">
    <h1>Set New Password</h1>
    <p class="sub">Choose a strong password for your RioData account.</p>
    <div class="form-group">
      <label>New Password</label>
      <input type="password" id="new-password" placeholder="At least 8 characters" oninput="checkStrength(this.value)">
      <div class="strength"><div class="strength-fill" id="strength-fill"></div></div>
      <div class="strength-text" id="strength-text" style="color:#5C5C54"></div>
    </div>
    <div class="form-group">
      <label>Confirm New Password</label>
      <input type="password" id="confirm-password" placeholder="Repeat your password">
    </div>
    <button class="btn btn-primary" id="reset-btn" onclick="resetPassword()">Set New Password</button>
    <div class="msg msg-error" id="msg-error"></div>
  </div>

  <div id="success-state" style="display:none;text-align:center;">
    <div style="font-size:48px;margin-bottom:16px;">✅</div>
    <h1 style="margin-bottom:8px;">Password Updated!</h1>
    <p class="sub">Your password has been changed. Redirecting...</p>
  </div>

  <div id="invalid-state" style="display:none;text-align:center;">
    <div style="font-size:48px;margin-bottom:16px;">⚠️</div>
    <h1 style="margin-bottom:8px;">Link Expired</h1>
    <p class="sub">This reset link has expired. Please request a new one.</p>
    <a href="/" class="btn btn-primary" style="display:block;text-align:center;text-decoration:none;margin-top:16px;">Back to RioData</a>
  </div>

  <div class="back"><a href="/">Back to RioData</a></div>
</div>

<script>
window.addEventListener('load', async () => {
  const hash = window.location.hash;
  const params = new URLSearchParams(hash.replace('#', '?'));
  const accessToken = params.get('access_token');
  const type = params.get('type');
  if (type === 'recovery' && accessToken) {
    const { error } = await sb.auth.setSession({
      access_token: accessToken,
      refresh_token: params.get('refresh_token') || ''
    });
    if (error) {
      document.getElementById('reset-form').style.display = 'none';
      document.getElementById('invalid-state').style.display = 'block';
    }
  } else {
    const { data: { session } } = await sb.auth.getSession();
    if (!session) {
      document.getElementById('reset-form').style.display = 'none';
      document.getElementById('invalid-state').style.display = 'block';
    }
  }
});

async function resetPassword() {
  const newPass = document.getElementById('new-password').value;
  const confirmPass = document.getElementById('confirm-password').value;
  const btn = document.getElementById('reset-btn');
  const errEl = document.getElementById('msg-error');
  errEl.style.display = 'none';
  if (!newPass || newPass.length < 8) { errEl.textContent = 'Password must be at least 8 characters.'; errEl.style.display = 'block'; return; }
  if (newPass !== confirmPass) { errEl.textContent = 'Passwords do not match.'; errEl.style.display = 'block'; return; }
  btn.disabled = true; btn.textContent = 'Updating...';
  const { error } = await sb.auth.updateUser({ password: newPass });
  if (error) {
    errEl.textContent = 'Error: ' + error.message; errEl.style.display = 'block';
    btn.disabled = false; btn.textContent = 'Set New Password';
  } else {
    document.getElementById('reset-form').style.display = 'none';
    document.getElementById('success-state').style.display = 'block';
    setTimeout(() => { window.location.href = '/'; }, 2000);
  }
}

function checkStrength(password) {
  const fill = document.getElementById('strength-fill');
  const text = document.getElementById('strength-text');
  if (!password) { fill.style.width = '0%'; text.textContent = ''; return; }
  let score = 0;
  if (password.length >= 8) score++;
  if (password.length >= 12) score++;
  if (/[A-Z]/.test(password)) score++;
  if (/[0-9]/.test(password)) score++;
  if (/[^A-Za-z0-9]/.test(password)) score++;
  const levels = [
    {pct:'20%',color:'#B8431E',label:'Too weak'},
    {pct:'40%',color:'#B07D1A',label:'Weak'},
    {pct:'60%',color:'#B07D1A',label:'Fair'},
    {pct:'80%',color:'#2A6B43',label:'Good'},
    {pct:'100%',color:'#2A6B43',label:'Strong'}
  ];
  const level = levels[Math.min(score, 4)];
  fill.style.width = level.pct; fill.style.background = level.color;
  text.textContent = level.label; text.style.color = level.color;
}

document.addEventListener('keydown', e => { if (e.key === 'Enter') resetPassword(); });
</script>
</body>
</html>
